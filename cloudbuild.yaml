# DEV PIPELINE - Branch-based (main branch)
# Triggers on: git push origin main
# Auto-deploys to development every push

substitutions:
  _DB_INSTANCE: "watchful-force-495414-t4:us-east4:pitcrew-db-dev"
  _DB_NAME: "pitcrew_db"
  _DB_USER: "postgres"
  _APP_KEY: "base64:xIIBXqpGxb9O8VGYvZWZq/SkXQDNKSJpLIhLVwuJaPI="

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--target=production', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel:latest', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel:dev-${SHORT_SHA}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'laravel-api',
           '--image=us-central1-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel:latest',
           '--region=us-central1',
           '--allow-unauthenticated',
           '--service-account=cloud-build-sa@${PROJECT_ID}.iam.gserviceaccount.com',
           '--add-cloudsql-instances=${_DB_INSTANCE}',
           '--update-env-vars=APP_ENV=development,APP_DEBUG=true,LOG_CHANNEL=stackdriver,DB_CONNECTION=pgsql,DB_HOST=/cloudsql/${_DB_INSTANCE},DB_PORT=5432,DB_DATABASE=${_DB_NAME},DB_USERNAME=${_DB_USER},DB_SSLMODE=prefer',
           '--set-secrets=APP_KEY=laravel-app-key:latest',
           '--set-secrets=DB_PASSWORD=laravel-db-password:latest']

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel:latest'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel:dev-${SHORT_SHA}'
